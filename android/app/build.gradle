apply plugin: 'com.android.application'
apply plugin: 'com.github.triplet.play'

// Play Publishing credential — JSON service-account key path.
// Resolution order: GOOGLE_PLAY_API_KEY env var, then `googlePlayApiKey=` in
// android/local.properties (gitignored). If it doesn't resolve to an existing
// file the plugin is disabled so normal builds keep working without credentials.
def playLocalProps = new Properties()
def playLocalPropsFile = rootProject.file('local.properties')
if (playLocalPropsFile.exists()) {
    playLocalPropsFile.withInputStream { playLocalProps.load(it) }
}
def playApiKeyPath = System.getenv('GOOGLE_PLAY_API_KEY') ?: playLocalProps.getProperty('googlePlayApiKey')
def playApiKeyFile = playApiKeyPath ? file(playApiKeyPath) : null
if (playApiKeyFile != null && !playApiKeyFile.exists()) {
    playApiKeyFile = null
}

android {
    namespace = "read.tehilim"
    compileSdk = rootProject.ext.compileSdkVersion
    defaultConfig {
        applicationId "read.tehilim"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 10008
        versionName "1.0.6"
        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"
        aaptOptions {
             // Files and dirs to omit from the packaged assets dir, modified to accommodate modern web apps.
             // Default: https://android.googlesource.com/platform/frameworks/base/+/282e181b58cf72b6ca770dc7ca5f91f135444502/tools/aapt/AaptAssets.cpp#61
            ignoreAssetsPattern = '!.svn:!.git:!.ds_store:!*.scc:.*:!CVS:!thumbs.db:!picasa.ini:!*~'
        }
    }
    signingConfigs {
        release {
            storeFile file('/Users/davidb/PycharmProjects/work/my-release-key.keystore')
            storePassword 'LeviTehila5775'
            keyAlias 'alias_name'
            keyPassword 'LeviTehila5775'
        }
    }
    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

repositories {
    flatDir{
        dirs '../capacitor-cordova-android-plugins/src/main/libs', 'libs'
    }
}

dependencies {
    implementation fileTree(include: ['*.jar'], dir: 'libs')
    implementation "androidx.appcompat:appcompat:$androidxAppCompatVersion"
    implementation "androidx.coordinatorlayout:coordinatorlayout:$androidxCoordinatorLayoutVersion"
    implementation "androidx.core:core-splashscreen:$coreSplashScreenVersion"
    implementation project(':capacitor-android')
    testImplementation "junit:junit:$junitVersion"
    androidTestImplementation "androidx.test.ext:junit:$androidxJunitVersion"
    androidTestImplementation "androidx.test.espresso:espresso-core:$androidxEspressoCoreVersion"
    implementation project(':capacitor-cordova-android-plugins')
}

apply from: 'capacitor.build.gradle'

// ---------------------------------------------------------------------------
// Gradle Play Publisher.
// `./gradlew :app:publishReleaseBundle` builds the signed AAB and uploads it to
// the Play Console **production** track at 100% (status COMPLETED) — full rollout
// to all users. Disabled automatically when no service-account JSON is present.
// ---------------------------------------------------------------------------
play {
    if (playApiKeyFile != null) {
        serviceAccountCredentials.set(playApiKeyFile)
    } else {
        enabled.set(false)
    }
    defaultToAppBundles.set(true)
    track.set('production')
    releaseStatus.set(com.github.triplet.gradle.androidpublisher.ReleaseStatus.COMPLETED)
    // FAIL if the AAB's versionCode already exists on the track (forgot to bump).
    resolutionStrategy.set(com.github.triplet.gradle.androidpublisher.ResolutionStrategy.FAIL)
}

try {
    def servicesJSON = file('google-services.json')
    if (servicesJSON.text) {
        apply plugin: 'com.google.gms.google-services'
    }
} catch(Exception e) {
    logger.info("google-services.json not found, google-services plugin not applied. Push Notifications won't work")
}
